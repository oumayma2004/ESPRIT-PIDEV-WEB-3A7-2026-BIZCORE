doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        # If needed, you can define DATABASE_URL in .env
        # example:
        # mysql://root:@127.0.0.1:3306/bizcore?serverVersion=8.0.0&charset=utf8mb4

    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        auto_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        mappings:
            App:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App