# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads'
    
    recaptcha_secret: '%env(RECAPTCHA_SECRET)%'
    recaptcha_site_key: '%env(RECAPTCHA_SITE_KEY)%'
    recaptcha_enabled: '%env(bool:RECAPTCHA_ENABLED)%'
    app_url: '%env(APP_URL)%'

    gemini_api_key: '%env(GEMINI_API_KEY)%'
    gemini_model: '%env(GEMINI_MODEL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\TwilioSmsService:
        arguments:
            $twilioAccountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $twilioAuthToken:  '%env(TWILIO_AUTH_TOKEN)%'
            $twilioFromNumber: '%env(TWILIO_FROM_NUMBER)%'
            $twilioToNumber:   '%env(TWILIO_TO_NUMBER)%'

    App\Service\ChatbotService:
        arguments:
            $aiApiUrl: '%env(AI_API_URL)%'
            $aiApiKey: '%env(AI_API_KEY)%'
            $aiModel: '%env(AI_MODEL)%'

    App\Service\RecaptchaVerifier:
        arguments:
            $recaptchaSecret: '%recaptcha_secret%'
            $recaptchaEnabled: '%recaptcha_enabled%'

    App\Model\CommentaireAnalysisModel:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\DomaineSuggestionService:
        arguments:
            $serpApiKey: '%env(SERPAPI_KEY_DOMAINES)%'
            $geminiApiKey: '%gemini_api_key%'
            $geminiModel: '%gemini_model%'

    App\Service\RegistrationMailService:
        arguments:
            $appUrl: '%app_url%'

    App\Service\GeminiChatService:
        arguments:
            $apiKey: '%gemini_api_key%'
            $model: '%gemini_model%'

    App\Service\TelegramNotificationService:
        arguments:
            $telegramBotToken: '%env(TELEGRAM_BOT_TOKEN)%'
            $telegramChatId: '%env(TELEGRAM_CHAT_ID)%'

    App\Service\FlashPromotionService:
        arguments:
            $kernelProjectDir: '%kernel.project_dir%'
